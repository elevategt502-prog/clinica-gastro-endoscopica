<!-- LOADING SCREEN — insert right after <body> opening tag -->
<div id="loading-screen" role="status" aria-label="Cargando sitio" aria-live="polite">
  <div class="loading-content">

    <!-- Animated CGE monogram SVG -->
    <svg
      class="loading-monogram"
      width="96"
      height="96"
      viewBox="0 0 96 96"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
      focusable="false"
    >
      <!-- Outer glow ring (animates opacity) -->
      <circle
        cx="48" cy="48" r="46"
        fill="none"
        stroke="rgba(201,168,76,0.18)"
        stroke-width="1"
        style="animation: loadingPulse 1.8s ease-in-out infinite; transform-origin: center;"
      />

      <!-- Main rounded square background -->
      <rect
        x="8" y="8"
        width="80" height="80"
        rx="16"
        fill="#0A2342"
      />

      <!-- Gold border frame -->
      <rect
        x="10" y="10"
        width="76" height="76"
        rx="14"
        fill="none"
        stroke="#C9A84C"
        stroke-width="1.5"
      />

      <!-- Inner accent ring (subtle) -->
      <rect
        x="14" y="14"
        width="68" height="68"
        rx="10"
        fill="none"
        stroke="rgba(201,168,76,0.25)"
        stroke-width="0.75"
      />

      <!-- CGE monogram text -->
      <text
        x="48"
        y="60"
        text-anchor="middle"
        dominant-baseline="auto"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="700"
        letter-spacing="2"
        fill="#C9A84C"
      >CGE</text>

      <!-- Decorative gold line above text -->
      <line
        x1="28" y1="36"
        x2="68" y2="36"
        stroke="rgba(201,168,76,0.4)"
        stroke-width="0.75"
      />
      <!-- Decorative gold line below text -->
      <line
        x1="28" y1="68"
        x2="68" y2="68"
        stroke="rgba(201,168,76,0.4)"
        stroke-width="0.75"
      />
    </svg>

    <!-- Clinic name -->
    <p class="loading-text">Clínica Gastro Endoscópica</p>

    <!-- Animated progress bar -->
    <div class="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
      <div class="loading-bar-fill"></div>
    </div>

  </div>
</div>
