<!-- STATS ROW — insert BEFORE .about-grid inside #sobre-mi -->
<div class="stats-row" aria-label="Estadísticas clave del Dr. Byron H. Lewin" role="region">

  <div class="stat-item" aria-label="30 o más años de experiencia">
    <span
      class="stat-number"
      data-counter="30"
      data-suffix="+"
      aria-live="polite"
    >30+</span>
    <span class="stat-label">Años de experiencia</span>
  </div>

  <div class="stat-item" aria-label="Fundada en 1994">
    <span
      class="stat-number"
      data-counter="1994"
      data-suffix=""
      aria-live="polite"
    >1994</span>
    <span class="stat-label">Año de fundación</span>
  </div>

  <div class="stat-item" aria-label="4 o más países de entrenamiento">
    <span
      class="stat-number"
      data-counter="4"
      data-suffix="+"
      aria-live="polite"
    >4+</span>
    <span class="stat-label">Países de entrenamiento</span>
  </div>

  <div class="stat-item" aria-label="Más de 30,000 pacientes atendidos">
    <span
      class="stat-number"
      data-counter="30000"
      data-suffix="+"
      aria-live="polite"
    >30,000+</span>
    <span class="stat-label">Pacientes atendidos</span>
  </div>

</div><!-- /.stats-row -->
